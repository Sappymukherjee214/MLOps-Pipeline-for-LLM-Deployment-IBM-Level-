apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llm-service-policy
spec:
  podSelector:
    matchLabels:
      app: llm-inference
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          role: frontend # Only allow frontend pods to access the API
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - ipBlock: # Allow outbound traffic for external LLM APIs (Gemini/OpenAI)
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
